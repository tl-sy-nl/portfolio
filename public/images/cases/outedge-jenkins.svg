<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340">
  <style>
    text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    .title { font-size: 15px; font-weight: 600; fill: #211E55; }
    .item { font-size: 12.5px; fill: #3A4A5C; line-height: 1.6; }
    .num { font-size: 12.5px; font-weight: 600; fill: #3A4A5C; }
    .section-title { font-size: 12px; font-weight: 600; fill: #211E55; text-anchor: middle; }
    .legend { font-size: 11px; fill: #666; }
  </style>

  <!-- Border -->
  <rect x="0" y="0" width="640" height="340" fill="white" stroke="#ddd" stroke-width="1" rx="4"/>

  <!-- Title -->
  <text x="320" y="35" text-anchor="middle" class="title">Henry Jenkins' Participatory Culture Theory</text>

  <!-- Bullet markers -->
  <!-- Item 1 -->
  <rect x="50" y="62" width="12" height="12" fill="#C75B7A" rx="2"/>
  <text x="72" y="74" class="num">1.</text>
  <text x="88" y="74" class="item">With relatively low barriers to artistic expression and civic</text>
  <text x="88" y="92" class="item">engagement</text>

  <!-- Item 2 -->
  <circle cx="56" cy="116" r="6" fill="#5B9BD5"/>
  <text x="72" y="121" class="num">2.</text>
  <text x="88" y="121" class="item">With strong support for creating and sharing one's creations with</text>
  <text x="88" y="139" class="item">others</text>

  <!-- Item 3 -->
  <circle cx="56" cy="163" r="6" fill="#7BAFAF"/>
  <text x="72" y="168" class="num">3.</text>
  <text x="88" y="168" class="item">With some type of informal mentorship whereby what is known by</text>
  <text x="88" y="186" class="item">the most experienced is passed along to novices</text>

  <!-- Item 4 -->
  <rect x="50" y="203" width="12" height="12" fill="#C75B7A" rx="2"/>
  <text x="72" y="215" class="num">4.</text>
  <text x="88" y="215" class="item">Where members believe that their contributions matter</text>

  <!-- Item 5 -->
  <circle cx="56" cy="247" r="6" fill="#5B9BD5"/>
  <text x="72" y="252" class="num">5.</text>
  <text x="88" y="252" class="item">Where members feel some degree of social connection with one</text>
  <text x="88" y="270" class="item">another.</text>

  <!-- Divider -->
  <line x1="120" y1="290" x2="520" y2="290" stroke="#ddd" stroke-width="1"/>

  <!-- Selected Target Concepts -->
  <text x="320" y="312" text-anchor="middle" class="section-title">Selected Target Concepts</text>

  <!-- Legend -->
  <rect x="150" y="322" width="10" height="10" fill="#C75B7A" rx="2"/>
  <text x="168" y="332" class="legend">Self-efficacy</text>

  <circle cx="370" cy="327" r="5" fill="#5B9BD5"/>
  <text x="383" y="332" class="legend">Interpersonal Interaction</text>
</svg>